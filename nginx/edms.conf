# =============================================================================
# FILE: nginx/edms.conf
# Nginx reverse-proxy config for EDMS-LDO production LAN deployment
#
# Architecture:
#   Browser → Nginx :80 → Django Gunicorn :8765 (API + media + static)
#                        → Built frontend static files (dist/)
#
# Install: copy to /etc/nginx/sites-available/edms
#          ln -s /etc/nginx/sites-available/edms /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx
#
# Windows Nginx: copy to nginx/conf/edms.conf and include in nginx.conf
# =============================================================================

upstream django_backend {
    server 127.0.0.1:8765;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost 192.168.1.100;  # Change to your server LAN IP

    client_max_body_size 50M;             # Allow large PDF/DWG uploads
    charset utf-8;

    # ---- Security headers ---------------------------------------------------
    add_header X-Frame-Options           SAMEORIGIN;
    add_header X-Content-Type-Options    nosniff;
    add_header X-XSS-Protection          "1; mode=block";
    add_header Referrer-Policy           "strict-origin-when-cross-origin";

    # ---- Frontend — serve built Vite dist files ----------------------------
    root /opt/edms/static/frontend;      # path to: frontend/dist after npm run build
    index index.html;

    location / {
        try_files $uri $uri/ /index.html; # SPA fallback for React Router
    }

    # ---- API — proxy to Django backend --------------------------------------
    location /api/ {
        proxy_pass         http://django_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_read_timeout 120s;
    }

    # ---- Django Admin -------------------------------------------------------
    location /admin/ {
        proxy_pass         http://django_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ---- Media files (uploaded PDFs, DWGs) ----------------------------------
    location /media/ {
        alias /opt/edms/media/;          # must match MEDIA_ROOT in settings.py
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ---- Django static (admin CSS/JS) ---------------------------------------
    location /static/ {
        alias /opt/edms/staticfiles/;    # must match STATIC_ROOT in settings.py
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ---- Block common attack vectors ----------------------------------------
    location ~ /\. { deny all; }
    location ~ \.py$ { deny all; }
}
