# =============================================================================
# FILE: deployment/nginx_windows.conf
# Windows LAN deployment — Nginx reverse proxy for PLW EDMS + LDO
# Copy to: C:\nginx\conf\nginx.conf
#
# Differences from Linux nginx.conf:
#   - Windows paths (C:\EDMS\...) instead of /opt/edms/...
#   - Frontend served from built React dist (frontend\dist)
#   - SSL cert paths adjusted for Windows
#   - pid file set to logs/nginx.pid (relative, avoids permission issues)
# =============================================================================

worker_processes  auto;
error_log  logs/nginx_error.log warn;
pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log  logs/nginx_access.log  main;

    sendfile           on;
    keepalive_timeout  65;
    client_max_body_size 52m;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    upstream edms_backend {
        server 127.0.0.1:8765;
        keepalive 32;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name 192.168.1.100 edms.lan localhost;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name 192.168.1.100 edms.lan localhost;

        # ---------------------------------------------------------------
        # SSL — self-signed cert for LAN
        # Generate with: openssl req -x509 -newkey rsa:4096 \
        #   -keyout C:\nginx\ssl\edms.key -out C:\nginx\ssl\edms.crt \
        #   -days 3650 -nodes -subj "/CN=edms.lan/O=PLW/C=IN"
        # ---------------------------------------------------------------
        ssl_certificate     C:/nginx/ssl/edms.crt;
        ssl_certificate_key C:/nginx/ssl/edms.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "same-origin" always;

        # ---------------------------------------------------------------
        # Static files — served directly from collectstatic output
        # ---------------------------------------------------------------
        location /static/ {
            alias C:/EDMS/staticfiles/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Media (uploaded documents) — force through Django for access log
        location /media/ {
            alias C:/EDMS/media/;
            internal;
        }

        # ---------------------------------------------------------------
        # Django API + Admin
        # ---------------------------------------------------------------
        location /api/ {
            proxy_pass         http://edms_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout    120s;
            proxy_connect_timeout  10s;
            proxy_send_timeout    120s;
        }

        location /admin/ {
            # Restrict admin panel to LAN subnet only
            allow 192.168.0.0/16;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;
            proxy_pass         http://edms_backend;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ---------------------------------------------------------------
        # React SPA — serves built frontend, handles client-side routing
        # ---------------------------------------------------------------
        location / {
            root  C:/EDMS/frontend/dist;
            index index.html;
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public";
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"PLW-EDMS"}';
            add_header Content-Type application/json;
        }
    }
}
