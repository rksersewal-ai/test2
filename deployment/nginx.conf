# nginx.conf - PLW EDMS LAN reverse proxy
# Place at: /etc/nginx/sites-available/edms or C:\nginx\conf\nginx.conf
# Designed for LAN-only deployment (192.168.x.x / 10.x.x.x)

upstream edms_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name 192.168.1.100 edms.lan;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name 192.168.1.100 edms.lan;

    # Self-signed cert for LAN (generate with: openssl req -x509 -newkey rsa:4096 ...)
    ssl_certificate     /etc/ssl/edms/edms.crt;
    ssl_certificate_key /etc/ssl/edms/edms.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Client upload size (50MB for document uploads)
    client_max_body_size 52m;

    # Static files served directly
    location /static/ {
        alias /opt/edms/staticfiles/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Media (uploaded documents)
    location /media/ {
        alias /opt/edms/media/;
        # Restrict direct media access - force through Django for access logging
        internal;
    }

    # Django API
    location /api/ {
        proxy_pass         http://edms_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Django Admin
    location /admin/ {
        # Restrict admin to specific IPs on LAN
        allow 192.168.1.0/24;
        deny all;
        proxy_pass       http://edms_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React frontend SPA
    location / {
        root  /opt/edms/frontend/build;
        index index.html;
        try_files $uri $uri/ /index.html;
        expires 1h;
    }

    # Health check
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
